<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and Logo -->
    <title>GitHub Issues Tracker | Home</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Icons | fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- DaisyUI + Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <header class="">
      <div class="navbar bg-base-100 shadow-sm flex flex-wrap items-center gap-3 md:gap-0">
        <div class="logo w-[50px] ml-10">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex flex-wrap md:flex-nowrap justify-center md:justify-end gap-2 items-center w-full md:w-auto">
          <div class="relative">
            <input
              id="input-search"
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-30 sm:w-40 md:w-64 text-blue-800 border-blue-600"
            />

            <button
              id="btn-search"
              class="btn btn-primary absolute right-3 top-1/2 -translate-y-1/2 text-white w-8 h-8 rounded-full flex items-center justify-center"
            >
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <button class="btn btn-primary text-xs md:text-sm md:mr-10">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>

    <section class="max-w-[1250px] w-full bg-white mx-auto mt-10 p-4">
      <button
        id="issue-btn-all"
        onclick="loadIssues('all')"
        class="btn btn-outline btn-primary flex-1 min-w-[80px] issue-btn"
      >
        All
      </button>

      <button
        id="issue-btn-open"
        onclick="loadIssues('open')"
        class="btn btn-outline btn-primary flex-1 min-w-[80px] issue-btn"
      >
        Open
      </button>

      <button
        id="issue-btn-closed"
        onclick="loadIssues('closed')"
        class="btn btn-outline btn-primary flex-1 min-w-[80px] issue-btn"
      >
        Closed
      </button>
    </section>

    <section class="max-w-[1250px] w-full bg-white mx-auto mt-5 p-4">
      <div class="flex flex-col md:flex-row justify-between gap-4">
        <div class="flex justify-center items-center gap-2">
          <div>
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 class="text-[20px] font-semibold">
              <span id="issue-count">50</span> Issues
            </h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex justify-center items-center gap-3">
          <div class="flex gap-1">
            <div class="text-[#00A96E]">
              <i class="fa-solid fa-circle"></i>
            </div>
            <p class="font-medium">Open</p>
          </div>

          <div class="flex gap-1">
            <div class="text-[#A855F7]">
              <i class="fa-solid fa-circle"></i>
            </div>
            <p class="font-medium">Closed</p>
          </div>
        </div>
      </div>
    </section>

    <section id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-dots loading-lg"></span>
    </section>

    <section class="max-w-[1250px] w-full bg-base-50 shadow mx-auto p-10">
      <div
        id="issue-container"
        class="w-11/12 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-x-30 gap-y-4"
      ></div>
    </section>

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-container"></div>

        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./scripts/home.js"></script>
  </body>
</html>
